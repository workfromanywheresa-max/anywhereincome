<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work From Anywhere Blog</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0 20px;
      background: #f4f4f4;
    }
    header {
      text-align: center;
      background: #111;
      color: white;
      padding: 20px 0;
    }
    h1 {
      margin: 0;
    }
    .posts {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .post {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }
    .post:hover {
      transform: scale(1.02);
    }
    .post img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }
    .post-content {
      padding: 15px;
    }
    .post-content h2 {
      margin: 0 0 10px;
      font-size: 1.2rem;
    }
    .post-content p {
      margin: 0;
      color: #555;
      font-size: 0.9rem;
    }
    a {
      text-decoration: none;
      color: inherit;
    }
  </style>
</head>
<body>

  <header>
    <h1>Work From Anywhere</h1>
  </header>

  <div class="posts" id="post-list">
    <!-- Posts will be loaded here dynamically -->
  </div>

  <script src="script.js"></script>
</body>
</html>
