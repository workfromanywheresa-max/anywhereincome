<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - AnywhereIncome</title>

  <link rel="stylesheet" href="style.css">

</head>
<body>

<div class="contact-wrapper">
  <h1>Contact Us</h1>
  <p>If you have questions, suggestions, or legal inquiries regarding this website, please use the form below.</p>

  <form action="mailto:workfromanywhere.sa@gmail.com" method="post" enctype="text/plain">
    
    <label for="name">Name</label>
    <input type="text" id="name" name="name" required>

    <label for="email">Email</label>
    <input type="email" id="email" name="email" required>

    <label for="message">Message</label>
    <textarea id="message" name="message" rows="6" required></textarea>

    <button type="submit">Send Message</button>

  </form>
</div>

</body>
</html>
